name: Keep FalixNodes Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping FalixNodes Console
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://client.falixnodes.net/server/2783469/console || true
          echo "Pinged at $(date)"
